pid /tmp/nginx.pid;

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  client_body_temp_path /tmp/client_body_temp 1 2;
  proxy_temp_path /tmp/proxy_temp 1 2;
  fastcgi_temp_path /tmp/fastcgi_temp 1 2;
  uwsgi_temp_path /tmp/uwsgi_temp 1 2;
  scgi_temp_path /tmp/scgi_temp 1 2;

  resolver 127.0.0.11 ipv6=off valid=30s;
  resolver_timeout 5s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  server {
    listen 80;
    server_name auth.localhost;

    location / {
      set $upstream http://keycloak:8080;
      proxy_pass $upstream;
    }
  }

  server {
    listen 80;
    server_name portainer.localhost;

    location / {
      set $upstream http://portainer:9000;
      proxy_pass $upstream;
    }
  }

  server {
    listen 80;
    server_name kafka.localhost;

    location / {
      set $upstream http://kafka-ui:8080;
      proxy_pass $upstream;
    }
  }

  server {
    listen 80;
    server_name redis.localhost;

    location / {
      set $upstream http://oauth2-proxy-redisinsight:4180;
      proxy_pass $upstream;
    }
  }

  server {
    listen 80;
    server_name pma.localhost;

    location / {
      set $upstream http://oauth2-proxy-phpmyadmin:4181;
      proxy_pass $upstream;
    }
  }

  server {
    listen 80;
    server_name mongo.localhost;

    location / {
      set $upstream http://oauth2-proxy-mongo-express:4182;
      proxy_pass $upstream;
    }
  }

  server {
    listen 80;
    server_name harbor.localhost;

    location / {
      set $upstream http://proxy:8080;
      proxy_pass $upstream;
    }
  }
}
