server.port=8080

spring.datasource.platform=mysql
db.num=1
db.url.0=jdbc:mysql://nacos-mysql:3306/nacos?characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.user=nacos
db.password=nacos-dev-password

# Native OIDC auth for local development.
nacos.core.auth.enabled=true
nacos.core.auth.system.type=oidc
nacos.core.auth.server.identity.key=serverIdentity
nacos.core.auth.server.identity.value=security
nacos.core.auth.plugin.nacos.token.secret.key=VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
nacos.core.auth.plugin.oidc.issuer-uri=http://auth.localhost/realms/infra
nacos.core.auth.plugin.oidc.client-id=nacos
nacos.core.auth.plugin.oidc.client-secret=nacos-client-secret
nacos.core.auth.plugin.oidc.scope=openid profile email
nacos.core.auth.plugin.oidc.username-claim=preferred_username
