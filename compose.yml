name: tools-sso

x-oauth2-proxy-common: &oauth2-proxy-common
  image: ${OAUTH2_PROXY_IMAGE}
  restart: unless-stopped
  volumes:
    - ./oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
  environment:
    OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
    OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
    OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
    OAUTH2_PROXY_OIDC_ISSUER_URL: ${PUBLIC_SCHEME}://${KEYCLOAK_PUBLIC_HOST}/realms/${KEYCLOAK_REALM}
    OAUTH2_PROXY_REDIS_CONNECTION_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
  extra_hosts:
    - "${KEYCLOAK_PUBLIC_HOST}:host-gateway"
  networks:
    - tools_net

services:
  keycloak-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tools_net

  keycloak:
    image: ${KEYCLOAK_IMAGE}
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${PUBLIC_SCHEME}://${KEYCLOAK_PUBLIC_HOST}
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - tools_net

  portainer:
    image: ${PORTAINER_IMAGE}
    container_name: portainer
    restart: unless-stopped
    command: --http-enabled --bind :9000 --bind-https ""
    extra_hosts:
      - "${KEYCLOAK_PUBLIC_HOST}:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - tools_net

  kafka-ui:
    image: ${KAFKA_UI_IMAGE}
    container_name: kafka-ui
    restart: unless-stopped
    extra_hosts:
      - "${KEYCLOAK_PUBLIC_HOST}:host-gateway"
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: optional:file:/etc/kafka-ui/
      PUBLIC_SCHEME: ${PUBLIC_SCHEME}
      PUBLIC_HOST: ${KAFKA_UI_PUBLIC_HOST}
      KEYCLOAK_PUBLIC_HOST: ${KEYCLOAK_PUBLIC_HOST}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KAFKA_UI_CLIENT_ID: ${KAFKA_UI_CLIENT_ID}
      KAFKA_UI_CLIENT_SECRET: ${KAFKA_UI_CLIENT_SECRET}
      KAFKA_UI_CLUSTER_NAME: ${KAFKA_UI_CLUSTER_NAME}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    volumes:
      - ./kafka-ui/application.yml:/etc/kafka-ui/application.yml:ro
    depends_on:
      - keycloak
      - kafka
    networks:
      - tools_net

  kafka:
    image: ${KAFKA_IMAGE}
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${PUBLIC_HOST}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID}@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - tools_net

  redis:
    image: ${REDIS_IMAGE}
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - tools_net

  redisinsight:
    image: ${REDISINSIGHT_IMAGE}
    container_name: redisinsight
    restart: unless-stopped
    environment:
      RI_APP_HOST: 0.0.0.0
      RI_ENCRYPTION_KEY: ${REDISINSIGHT_ENCRYPTION_KEY}
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - tools_net

  mariadb:
    image: ${MARIADB_IMAGE}
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - tools_net

  phpmyadmin:
    image: ${PHPMYADMIN_IMAGE}
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: ${PUBLIC_SCHEME}://${PHPMYADMIN_PUBLIC_HOST}/
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      PHPMYADMIN_AUTOLOGIN_USER: ${PHPMYADMIN_AUTOLOGIN_USER}
      PHPMYADMIN_AUTOLOGIN_PASSWORD: ${PHPMYADMIN_AUTOLOGIN_PASSWORD}
      UPLOAD_LIMIT: 256M
    volumes:
      - ./phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    depends_on:
      - mariadb
    networks:
      - tools_net

  mongodb:
    image: ${MONGO_IMAGE}
    container_name: mongodb
    restart: unless-stopped
    command: ["--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - tools_net

  mongo-express:
    image: ${MONGO_EXPRESS_IMAGE}
    container_name: mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      ME_CONFIG_SITE_BASEURL: /
    depends_on:
      - mongodb
    networks:
      - tools_net

  oauth2-proxy-redisinsight:
    <<: *oauth2-proxy-common
    container_name: oauth2-proxy-redisinsight
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
      - --http-address=0.0.0.0:4180
      - --redirect-url=${PUBLIC_SCHEME}://${REDISINSIGHT_PUBLIC_HOST}/oauth2/callback
      - --upstream=http://redisinsight:5540/
      - --cookie-name=_oauth2_proxy_ri
    depends_on:
      - keycloak
      - redis
      - redisinsight

  oauth2-proxy-phpmyadmin:
    <<: *oauth2-proxy-common
    container_name: oauth2-proxy-phpmyadmin
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
      - --http-address=0.0.0.0:4181
      - --redirect-url=${PUBLIC_SCHEME}://${PHPMYADMIN_PUBLIC_HOST}/oauth2/callback
      - --upstream=http://phpmyadmin:80/
      - --cookie-name=_oauth2_proxy_pma
      - --allowed-group=${PHPMYADMIN_ALLOWED_GROUP}
    depends_on:
      - keycloak
      - redis
      - phpmyadmin

  oauth2-proxy-mongo-express:
    <<: *oauth2-proxy-common
    container_name: oauth2-proxy-mongo-express
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
      - --http-address=0.0.0.0:4182
      - --redirect-url=${PUBLIC_SCHEME}://${MONGO_EXPRESS_PUBLIC_HOST}/oauth2/callback
      - --upstream=http://mongo-express:8081/
      - --cookie-name=_oauth2_proxy_mongo
    depends_on:
      - keycloak
      - redis
      - mongo-express

  gateway:
    image: ${GATEWAY_IMAGE}
    container_name: gateway
    restart: unless-stopped
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - keycloak
      - portainer
      - kafka-ui
      - oauth2-proxy-redisinsight
      - oauth2-proxy-phpmyadmin
      - oauth2-proxy-mongo-express
    networks:
      - tools_net

networks:
  tools_net:
    external: true
    name: ${TOOLS_NETWORK}

volumes:
  kafka_data:
  keycloak_postgres_data:
  portainer_data:
  redis_data:
  redisinsight_data:
  mariadb_data:
  mongodb_data:
